<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>மாணவர் கலைத்திறன் — தமிழ் இதழ்</title>
    <link rel="stylesheet" href="../brand/brand.css">
    <link rel="stylesheet" href="_master.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <article class="gallery-page">
        <header class="gallery-header">
            <h1>மாணவர் கலைத்திறன்</h1>
            <p class="gallery-subtitle">Students' Art Showcase</p>
        </header>

        <p class="gallery-intro">நமது மாணவர்களின் அற்புதமான ஓவியங்கள்</p>

        <!-- Example: 4 artworks in 2x2 grid -->
        <div class="gallery-grid grid-4">
            <div class="gallery-item">
                <img src="" alt="ஓவியம் 1">
                <div class="gallery-caption">
                    <div class="artwork-title">இயற்கை அழகு</div>
                    <div class="artist-name">அருண் குமார்</div>
                    <div class="artist-info">வகுப்பு 5 — சென்னை பள்ளி</div>
                </div>
            </div>
            <div class="gallery-item">
                <img src="" alt="ஓவியம் 2">
                <div class="gallery-caption">
                    <div class="artwork-title">என் கிராமம்</div>
                    <div class="artist-name">பிரியா</div>
                    <div class="artist-info">வகுப்பு 4 — மதுரை பள்ளி</div>
                </div>
            </div>
            <div class="gallery-item">
                <img src="" alt="ஓவியம் 3">
                <div class="gallery-caption">
                    <div class="artwork-title">வானவில்</div>
                    <div class="artist-name">கார்த்திக்</div>
                    <div class="artist-info">வகுப்பு 6 — கோயம்புத்தூர் பள்ளி</div>
                </div>
            </div>
            <div class="gallery-item">
                <img src="" alt="ஓவியம் 4">
                <div class="gallery-caption">
                    <div class="artwork-title">கோயில் கோபுரம்</div>
                    <div class="artist-name">மீனா</div>
                    <div class="artist-info">வகுப்பு 3 — திருச்சி பள்ளி</div>
                </div>
            </div>
        </div>
    </article>
</body>
</html>
