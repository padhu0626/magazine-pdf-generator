<head>

    <title>புகைப்படக் கட்டுரை — தமிழ் இதழ்</title>
    <link rel="stylesheet" href="../brand/brand.css">
    <link rel="stylesheet" href="_master.css">

</head>
<body>
    <article class="photo-essay">
        <header class="photo-header">
            <span class="category-tag">Photo Essay &middot; புகைப்படக் கட்டுரை</span>
            <h1>கோயில்களின் கலை</h1>
            <p class="byline">புகைப்படங்கள்: கலைஞர் ராஜா &middot; ஏப்ரல் 2026</p>
        </header>

        <figure class="photo-full">
            <img src="" alt="கோயில் சிற்பம்">
            <figcaption>தஞ்சாவூர் பெரிய கோயிலின் நுழைவாயில் சிற்பங்கள். ஆயிரம் ஆண்டுகளுக்கு முன்பு செதுக்கப்பட்ட இச்சிற்பங்கள் இன்றும் அழகாக நிற்கின்றன.</figcaption>
        </figure>

        <p class="essay-text">
            தமிழ்நாட்டின் கோயில்கள் வெறும் வழிபாட்டுத் தலங்கள் அல்ல — அவை திறந்தவெளி அருங்காட்சியகங்கள். ஒவ்வொரு கல்லிலும் ஒரு கதை சொல்லப்பட்டுள்ளது.
        </p>

        <figure class="photo-full">
            <img src="" alt="கோயில் கோபுரம்">
            <figcaption>மதுரை மீனாட்சி கோயிலின் கோபுரம் — நிறங்களின் விருந்து.</figcaption>
        </figure>

        <figure class="photo-full">
            <img src="" alt="கோயில் ஓவியம்">
            <figcaption>சிதம்பரம் நடராஜர் கோயிலின் உட்புற ஓவியங்கள்.</figcaption>
        </figure>
    </article>
