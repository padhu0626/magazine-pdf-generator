<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazine PDF Generator — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/client/assets/css/admin.css">
</head>
<body>
    <header class="header">
        <h1>Magazine PDF Generator</h1>
        <p>Upload .docx articles → Preview layout → Generate print-quality PDF</p>
        <a href="/issue" style="color:#c9a961;font-size:0.9rem;">→ Issue Assembly (multi-article magazine)</a>
    </header>

    <main class="container">
        <!-- Step 1: Upload -->
        <section class="card">
            <h2><span class="step">1</span> Upload Article (.docx)</h2>
            <div class="upload-area" id="drop-zone">
                <input type="file" id="docx-input" accept=".docx" hidden>
                <p class="upload-icon">📄</p>
                <p>Drag & drop a .docx file here</p>
                <p class="muted">or <button class="link-btn" id="browse-btn">browse files</button></p>
            </div>
            <div id="upload-status" class="status" hidden></div>
        </section>

        <!-- Step 2: Parsed Content -->
        <section class="card" id="parsed-section" hidden>
            <h2><span class="step">2</span> Parsed Content</h2>
            <div class="parsed-grid">
                <div class="field">
                    <label>Title</label>
                    <input type="text" id="parsed-title" class="input">
                </div>
                <div class="field">
                    <label>Subtitle</label>
                    <input type="text" id="parsed-subtitle" class="input">
                </div>
                <div class="field-row">
                    <div class="field">
                        <label>Author</label>
                        <input type="text" id="parsed-author" class="input">
                    </div>
                    <div class="field">
                        <label>Category</label>
                        <input type="text" id="parsed-category" class="input">
                    </div>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label>Word Count</label>
                        <span id="parsed-wordcount" class="badge">—</span>
                    </div>
                    <div class="field">
                        <label>Images</label>
                        <span id="parsed-images" class="badge">—</span>
                    </div>
                    <div class="field">
                        <label>Suggested Template</label>
                        <span id="parsed-template" class="badge accent">—</span>
                    </div>
                </div>
                <div class="field">
                    <label>Pull Quotes</label>
                    <div id="parsed-pullquotes" class="pullquotes"></div>
                </div>
                <div class="field">
                    <label>Body Preview</label>
                    <div id="parsed-body" class="body-preview"></div>
                </div>
            </div>
        </section>

        <!-- Step 3: Generate -->
        <section class="card" id="generate-section" hidden>
            <h2><span class="step">3</span> Generate PDF</h2>
            <div class="field">
                <label>Template</label>
                <select id="template-select" class="input">
                    <option value="cover">1. Cover Page</option>
                    <option value="toc">2. Table of Contents</option>
                    <option value="editors-letter">3. Editor's Letter</option>
                    <option value="feature-opening" selected>4. Feature Article — Opening</option>
                    <option value="feature-continuation">5. Feature Article — Continuation</option>
                    <option value="interview">6. Interview</option>
                    <option value="short-story">7. Short Story / Fiction</option>
                    <option value="poetry">8. Poetry</option>
                    <option value="editorial">9. Editorial / Opinion</option>
                    <option value="photo-essay">10. Photo Essay</option>
                    <option value="cartoon">11. Cartoon / Illustration</option>
                    <option value="back-cover">12. Back Cover</option>
                    <option value="gallery">13. Gallery / Kids Art</option>
                </select>
            </div>
            <button class="btn btn-primary" id="generate-btn">Generate PDF</button>
            <div id="generate-status" class="status" hidden></div>
        </section>

        <!-- Step 4: Result -->
        <section class="card" id="result-section" hidden>
            <h2><span class="step">4</span> Result</h2>
            <div class="result-box">
                <p class="success-text">PDF generated successfully!</p>
                <div class="result-actions">
                    <a id="download-link" href="#" class="btn btn-primary" target="_blank">Download PDF</a>
                    <button class="btn btn-secondary" id="new-article-btn">Upload Another</button>
                </div>
            </div>
            <div id="pdf-preview" class="pdf-preview">
                <iframe id="pdf-frame" class="pdf-frame"></iframe>
            </div>
        </section>
    </main>

    <script src="/client/assets/js/admin.js"></script>
</body>
</html>
